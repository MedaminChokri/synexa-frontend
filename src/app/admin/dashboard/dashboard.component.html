<div class="dashboard-layout">
  <!-- Sidebar -->
  <aside class="sidebar bx-sidebar" [class.sidebar-open]="sidebarOpen">
    <div class="sidebar-logo bx-logo">
      <span class="logo-text">SYNEXA</span>
      <span class="logo-sub">Workspace</span>
    </div>

    <div class="admin-profile">
      <div class="profile-avatar">{{ adminUsername.charAt(0).toUpperCase() }}</div>
      <div class="profile-info">
        <span class="profile-name">{{ adminUsername }}</span>
        <span class="role-badge"
          [style.background]="adminService.getRoleBadgeStyle().background"
          [style.color]="adminService.getRoleBadgeStyle().color">{{ adminRole }}</span>
      </div>
    </div>

    <nav class="sidebar-nav bx-nav">
      <ng-container *ngFor="let group of navGroups">
        <div class="nav-group-title">{{ group.label }}</div>
        <button
          *ngFor="let item of group.items"
          class="nav-item bx-nav-item"
          [class.active]="activeSection === item.key"
          (click)="navigate(item)"
        >
          <span class="nav-icon" [style.color]="item.iconColor"><i [class]="item.icon"></i></span>
          <span class="nav-label">{{ item.label }}</span>
          <span class="nav-badge" *ngIf="item.badgeCount && item.badgeCount > 0">{{ item.badgeCount }}</span>
        </button>
      </ng-container>
    </nav>
  </aside>

  <!-- Overlay for mobile -->
  <div class="sidebar-overlay" *ngIf="sidebarOpen" (click)="toggleSidebar()"></div>

  <!-- Main content -->
  <div class="main-content bx-main">
    <header class="top-bar bx-header">
      <div class="header-left">
        <button class="hamburger bx-hamburger" (click)="toggleSidebar()">
          <i class="fas fa-bars"></i>
        </button>
        <div class="page-title-container">
          <h1 class="page-title">Tableau de bord</h1>
          <span class="header-date">{{ currentDateStr }}</span>
        </div>
      </div>
      
      <div class="header-right">
        <div class="header-user">
          <span class="user-greeting">Bonjour, {{ adminUsername }}</span>
        </div>
        <button class="btn-account" (click)="openAccountModal()" title="Mon compte">
          <i class="fas fa-user-cog"></i>
        </button>
        <button class="btn-logout bx-logout" (click)="logout()">
          <i class="fas fa-sign-out-alt"></i>
        </button>
      </div>
    </header>

    <div class="content-area bx-content">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>

<!-- Modal Mon Compte -->
<div class="modal-overlay" *ngIf="showAccountModal" (click)="closeAccountModal()"></div>
<div class="modal-account" *ngIf="showAccountModal">
  <div class="modal-header">
    <h3><i class="fas fa-user-cog"></i> Mon compte</h3>
    <button class="modal-close" (click)="closeAccountModal()"><i class="fas fa-times"></i></button>
  </div>
  <div class="modal-body">
    <div *ngIf="accountSuccess" class="alert-success"><i class="fas fa-check-circle"></i> {{ accountSuccess }}</div>
    <div *ngIf="accountError" class="alert-error"><i class="fas fa-exclamation-circle"></i> {{ accountError }}</div>
    <div class="form-group">
      <label>Nom</label>
      <input type="text" [(ngModel)]="accountForm.nom" placeholder="Votre nom" />
    </div>
    <div class="form-group">
      <label>Email de connexion</label>
      <input type="email" [(ngModel)]="accountForm.email" placeholder="email@synexa.com" />
    </div>
    <div class="form-group">
      <label>Nouveau mot de passe <span class="optional">(laisser vide pour ne pas changer)</span></label>
      <input type="password" [(ngModel)]="accountForm.motDePasse" placeholder="Nouveau mot de passe" />
    </div>
    <div class="form-group">
      <label>Confirmer le mot de passe</label>
      <input type="password" [(ngModel)]="accountForm.motDePasseConfirm" placeholder="Confirmer" />
    </div>
  </div>
  <div class="modal-footer">
    <button class="btn-cancel" (click)="closeAccountModal()">Annuler</button>
    <button class="btn-save" (click)="saveAccount()" [disabled]="savingAccount">
      <i class="fas fa-save"></i> {{ savingAccount ? 'Enregistrement...' : 'Enregistrer' }}
    </button>
  </div>
</div>
