<!-- chatbot-widget.component.html — Widget de chat simple SYNEXA -->

<!-- Bouton flottant FAB -->
<div class="chatbot-fab" *ngIf="!estOuvert" (click)="basculerChat()">
  <div class="fab-icon-wrap">
    <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22">
      <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/>
    </svg>
  </div>
  <div class="fab-text">
    <span class="fab-title">Assistant SYNEXA</span>
    <span class="fab-sub">Posez-nous une question</span>
  </div>
</div>

<!-- Fenêtre de chat -->
<div class="synexa-chat-window" [class.synexa-chat-window--ouvert]="estOuvert"
     role="dialog" aria-label="Chat SYNEXA" aria-modal="true">

  <!-- En-tête -->
  <div class="synexa-chat-header">
    <div class="synexa-chat-header__info">
      <div class="synexa-chat-avatar" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </div>
      <div>
        <span class="synexa-chat-header__nom">Assistant SYNEXA</span>
        <span class="synexa-chat-header__statut">
          <span class="synexa-statut-dot synexa-statut-dot--online"></span>
          En ligne · Disponible 24/7
        </span>
      </div>
    </div>

    <!-- Actions entête -->
    <div class="synexa-chat-header__actions">
      <!-- Bouton nouvelle conversation -->
      <button class="synexa-chat-header__btn" (click)="nouvelleConversation()"
              aria-label="Nouvelle conversation" title="Nouvelle conversation">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
             fill="currentColor" width="16" height="16">
          <path d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
        </svg>
      </button>

      <!-- Bouton fermer -->
      <button class="synexa-chat-header__fermer" (click)="fermerChat()"
              aria-label="Fermer le chat" title="Fermer">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
             fill="currentColor" width="18" height="18">
          <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59
                   12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Zone des messages -->
  <div class="synexa-chat-messages" #messagesContainer role="log"
       aria-live="polite" aria-label="Messages de la conversation">

    <div *ngFor="let msg of messages"
         class="synexa-message"
         [class.synexa-message--utilisateur]="msg.auteur === 'utilisateur'"
         [class.synexa-message--bot]="msg.auteur === 'bot'">

      <div class="synexa-message__avatar" *ngIf="msg.auteur === 'bot'" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" width="13" height="13">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </div>

      <div class="synexa-message__bulle">
        <p class="synexa-message__texte">{{ msg.texte }}</p>
      </div>
    </div>

    <!-- Typing indicator simple (pendant requête HTTP) -->
    <div class="synexa-message synexa-message--bot synexa-message--frappe"
         *ngIf="botEnCours" aria-label="L'assistant est en train de répondre">
      <div class="synexa-message__avatar" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" width="13" height="13">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </div>
      <div class="synexa-message__bulle synexa-frappe-bulle">
        <span class="synexa-frappe-point"></span>
        <span class="synexa-frappe-point"></span>
        <span class="synexa-frappe-point"></span>
      </div>
    </div>
  </div>

  <!-- Suggestions rapides -->
  <div class="synexa-suggestions" *ngIf="afficherSuggestions && !botEnCours">
    <button *ngFor="let s of suggestions"
            class="synexa-suggestion-btn"
            (click)="utiliserSuggestion(s)"
            type="button">
      {{ s }}
    </button>
  </div>

  <!-- Zone de saisie -->
  <div class="synexa-chat-input-zone">
    <input
      #inputRef
      type="text"
      class="synexa-chat-input"
      placeholder="Écrivez votre message..."
      [(ngModel)]="saisieUtilisateur"
      (keydown)="onToucheEnfoncee($event)"
      [disabled]="botEnCours"
      maxlength="500"
      aria-label="Saisir un message"
      autocomplete="off"
    />
    <button
      class="synexa-chat-envoyer"
      (click)="envoyerMessage()"
      [disabled]="!saisieUtilisateur.trim() || botEnCours"
      aria-label="Envoyer le message"
      title="Envoyer">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
           fill="currentColor" width="18" height="18">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>
</div>
