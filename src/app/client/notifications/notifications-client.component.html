<div class="page-container">
  <div class="page-header">
    <div class="header-content">
      <h2><i class="fas fa-bell"></i> Mes Notifications</h2>
      <p class="page-subtitle">Restez informé de l'activité sur votre compte</p>
    </div>
    <button class="btn-outline" (click)="marquerToutLu()"><i class="fas fa-check-double"></i> Tout marquer comme lu</button>
  </div>

  <div *ngIf="loading" class="loading-state"><div class="spinner"></div></div>

  <div class="notifications-list" *ngIf="!loading && notifications.length > 0">
    <div class="notif-card" *ngFor="let notif of notifications" [class.unread]="!notif.lu" (click)="marquerCommeLue(notif)">
      <div class="notif-icon" [style.background]="getBgColor(notif.type)">
        <i class="fas" [ngClass]="getIcone(notif.type)"></i>
      </div>
      <div class="notif-content">
        <h4>{{ notif.titre }}</h4>
        <p>{{ notif.message }}</p>
        <span class="notif-date">{{ notif.dateCreation | date:'dd/MM/yyyy à HH:mm' }}</span>
      </div>
      <div class="notif-indicator" *ngIf="!notif.lu"></div>
    </div>
  </div>

  <div class="empty-state" *ngIf="!loading && notifications.length === 0">
    <i class="fas fa-bell-slash"></i>
    <h3>Aucune notification</h3>
    <p>Vous êtes à jour !</p>
  </div>
</div>
