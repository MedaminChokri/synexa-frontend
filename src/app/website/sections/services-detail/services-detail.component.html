<div class="services-page">

  <!-- Header -->
  <section class="services-header">
    <div class="container">
      <a routerLink="/" class="back-link"><i class="fas fa-arrow-left"></i> Accueil</a>
      <h1>Nos <span class="highlight">Services</span></h1>
      <p class="subtitle">Des expertises complètes pour accompagner votre croissance et votre transformation</p>
    </div>
  </section>

  <!-- Onglets catégories -->
  <section class="tabs-section">
    <div class="container">
      <div class="tabs-bar">
        <button
          class="tab-btn"
          *ngFor="let cat of categories"
          [class.active]="activeTab === cat.id"
          (click)="setActive(cat.id)">
          <i [class]="cat.icone"></i>
          <span>{{ cat.titre }}</span>
        </button>
      </div>
    </div>
  </section>

  <!-- Contenu de la catégorie active -->
  <section class="services-content">
    <div class="container">

      <div class="categorie-header animate-on-scroll">
        <div class="cat-icon"><i [class]="activeCategorie.icone"></i></div>
        <div>
          <h2>{{ activeCategorie.titre }}</h2>
          <p class="cat-subtitle">{{ activeCategorie.sousTitre }}</p>
        </div>
      </div>

      <div class="services-grid">
        <div class="service-card animate-on-scroll" *ngFor="let s of activeCategorie.services; let i = index">
          <div class="card-top">
            <div class="service-icon"><i [class]="s.icone"></i></div>
            <span class="service-num">0{{ i + 1 }}</span>
          </div>
          <h3>{{ s.titre }}</h3>
          <p>{{ s.description }}</p>
        </div>
      </div>

    </div>
  </section>


</div>
