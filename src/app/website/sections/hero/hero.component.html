<section class="hero" id="hero">

  <!-- Slides photos -->
  <div class="hero-slides">
    <div class="hero-slide" [class.active]="currentSlide === 0">
      <img
        src="https://images.unsplash.com/photo-1600880292203-757bb62b4baf?w=1200"
        alt="Business Consulting"
        class="hero-person-img"
        (error)="onImageError($event)"/>
    </div>
    <div class="hero-slide" [class.active]="currentSlide === 1">
      <img
        src="https://images.unsplash.com/photo-1522071820081-009f0129c71c?w=1200"
        alt="Management Consulting"
        class="hero-person-img hero-person-img-flip"
        (error)="onImageError($event)"
      />
    </div>
  </div>

  <!-- Overlay -->
  <div class="hero-overlay"></div>

  <!-- Éléments flottants -->
  <div class="floating-el" style="top:18%;left:32%;animation-delay:0s">
    <i class="fas fa-chart-line"></i>
  </div>
  <div class="floating-el" style="top:13%;left:20%;animation-delay:0.5s">
    <i class="fas fa-brain"></i>
  </div>
  <div class="floating-el" style="top:40%;left:40%;animation-delay:1s">
    <i class="fas fa-robot"></i>
  </div>
  <div class="floating-el" style="top:60%;left:15%;animation-delay:1.5s">
    <i class="fas fa-wifi"></i>
  </div>
  <div class="floating-el" style="top:30%;left:10%;animation-delay:0.8s">
    <i class="fas fa-home"></i>
  </div>
  <div class="floating-el" style="top:52%;left:37%;animation-delay:2s">
    <i class="fas fa-envelope"></i>
  </div>
  <div class="floating-el" style="top:22%;left:6%;animation-delay:1.3s">
    <i class="fas fa-microchip"></i>
  </div>
  <div class="floating-el" style="top:70%;left:28%;animation-delay:0.6s">
    <i class="fas fa-network-wired"></i>
  </div>
  <div class="floating-number" style="top:66%;left:20%;animation-delay:1.2s">743.06</div>
  <div class="floating-number" style="top:43%;left:44%;animation-delay:0.3s">306 98</div>
  <div class="floating-number" style="top:20%;left:28%;animation-delay:0.7s">73 79</div>
  <div class="floating-number" style="top:48%;left:8%;animation-delay:1.8s">454 87</div>
  <div class="floating-number" style="top:33%;left:36%;animation-delay:2.2s">128 55</div>

  <!-- Texte droite -->
  <div class="hero-content">
    <h1 class="hero-title animate-fade-in-up">SYNEXA,</h1>
    <p class="hero-subtitle animate-fade-in-up" style="animation-delay:0.1s">
      est un groupe de <span class="text-cyan">conseil stratégique</span>
      et opérationnel, avec une forte dimension d'innovation
      technologique et digitale.
    </p>
    <div class="animate-fade-in-up" style="animation-delay:0.2s">
      <a class="btn-cyan" (click)="scrollTo('contact')">
        {{ 'hero.cta' | translate }}
      </a>
    </div>
  </div>

</section>
