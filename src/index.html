
<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>SYNEXA Consult - Management & Business Consulting</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
  <meta name="theme-color" content="#0b1220">
  <meta name="description" content="SYNEXA Consult - Cabinet de conseil en management, transformation digitale et gestion de projets. Expertise internationale Europe & Afrique.">
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <!-- Préconnexions pour accélérer le premier chargement -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://synexa-backend.onrender.com" crossorigin>
  <link rel="dns-prefetch" href="https://synexa-backend.onrender.com">
  <link rel="dns-prefetch" href="https://synexa-chatbot.onrender.com">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <style>
    /* Splash screen affiché pendant le chargement d'Angular et le réveil du backend */
    html, body { margin: 0; padding: 0; background: #0b1220; }
    #app-splash {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 9% 10%, rgba(99, 102, 241, 0.25), transparent 35%), #0b1220;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: #f1f5f9;
      transition: opacity 0.4s ease;
    }
    #app-splash.hide { opacity: 0; pointer-events: none; }
    .splash-logo {
      font-size: 38px;
      font-weight: 800;
      letter-spacing: 4px;
      background: linear-gradient(135deg, #6366f1, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }
    .splash-sub {
      font-size: 11px;
      letter-spacing: 2px;
      color: rgba(148, 163, 184, 0.7);
      text-transform: uppercase;
      margin-bottom: 32px;
    }
    .splash-spinner {
      width: 42px;
      height: 42px;
      border: 3px solid rgba(99, 102, 241, 0.2);
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: splash-spin 0.9s linear infinite;
    }
    .splash-msg {
      margin-top: 24px;
      font-size: 13px;
      color: rgba(226, 232, 240, 0.6);
      max-width: 320px;
      text-align: center;
      padding: 0 16px;
    }
    @keyframes splash-spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="app-splash">
    <div class="splash-logo">SYNEXA</div>
    <div class="splash-sub">Consult</div>
    <div class="splash-spinner"></div>
    <div class="splash-msg" id="splash-msg">Chargement de la plateforme…</div>
  </div>

  <app-root></app-root>

  <script>
    (function() {
      // Réveil du backend Render dès que possible (pendant qu'Angular charge)
      var apiHost = location.hostname === 'localhost'
        ? 'http://localhost:8080'
        : 'https://synexa-backend.onrender.com';
      try {
        fetch(apiHost + '/api/insights', { method: 'GET', mode: 'cors', cache: 'no-store' })
          .catch(function() {});
      } catch (e) {}

      // Message progressif si chargement long
      var msgEl = document.getElementById('splash-msg');
      setTimeout(function() {
        if (msgEl) msgEl.textContent = 'Réveil du serveur en cours, merci de patienter…';
      }, 6000);
      setTimeout(function() {
        if (msgEl) msgEl.textContent = 'Le premier chargement peut prendre jusqu’à 60 secondes.';
      }, 15000);

      // Cache le splash quand Angular est monté
      function hideSplash() {
        var splash = document.getElementById('app-splash');
        if (!splash) return;
        splash.classList.add('hide');
        setTimeout(function() { splash.parentNode && splash.parentNode.removeChild(splash); }, 500);
      }
      // Heuristique : <app-root> contient du contenu = Angular est prêt
      var checkInterval = setInterval(function() {
        var root = document.querySelector('app-root');
        if (root && root.children.length > 0) {
          clearInterval(checkInterval);
          hideSplash();
        }
      }, 100);
      // Sécurité : au pire, on cache le splash après 60s
      setTimeout(function() {
        clearInterval(checkInterval);
        hideSplash();
      }, 60000);
    })();
  </script>
</body>
</html>
